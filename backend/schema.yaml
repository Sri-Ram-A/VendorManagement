openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/analytics/vendors/:
    get:
      operationId: vendor_list
      description: Returns a clean array containing all registered vendor compliance
        rows.
      summary: List vendors
      tags:
      - Vendors
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VendorList'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/analytics/vendors/{vendor_id}/:
    get:
      operationId: vendor_detail
      description: Fetches the complete compliance ledger, including data categories,
        legal bounds, and linked document artifacts.
      summary: Retrieve a vendor compliance profile
      parameters:
      - in: path
        name: vendor_id
        schema:
          type: string
          format: uuid
        description: The unique database UUID identifying the target vendor record.
        required: true
      tags:
      - Vendors
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified vendor UUID does not exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/analytics/vendors/{vendor_id}/predict/:
    get:
      operationId: vendor_risk_prediction
      description: Runs the anomaly model for a vendor registry record and returns
        the predicted class plus class probabilities.
      summary: Predict vendor anomaly risk
      parameters:
      - in: path
        name: vendor_id
        schema:
          type: string
          format: uuid
        description: Vendor registry UUID.
        required: true
      tags:
      - Analytics
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorRiskPredictionResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Vendor not found in registry.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unexpected model or inference failure.
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
