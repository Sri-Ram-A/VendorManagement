  /api/vendors/ingest:
    post:
      operationId: vendor-ingestion
      description: Uploads documents and starts asynchronous compliance analysis.
      summary: Create vendor assessment
      tags:
      - vendors
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VendorIngestionRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VendorIngestionRequestRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorIngestionResponse'
          description: ''
components:
  schemas:
    CurrentStatusEnum:
      enum:
      - PENDING
      - PROCESSING
      - VERIFIED
      - CONDITIONAL
      - QUARANTINED
      type: string
      description: |-
        * `PENDING` - Pending Assessment
        * `PROCESSING` - Processing Ingestion Pipeline
        * `VERIFIED` - Verified Low Risk
        * `CONDITIONAL` - Conditional Medium Risk
        * `QUARANTINED` - Critical High Risk Action Required
    DeclaredDataCategoriesEnum:
      enum:
      - PCI_CARDHOLDER_DATA
      - CUSTOMER_PII
      - CREDENTIALS_AUTH
      - FINANCIAL_RECORDS
      - PUBLIC_MARKETING
      type: string
      description: |-
        * `PCI_CARDHOLDER_DATA` - Credit Card Details / PAN / CVV
        * `CUSTOMER_PII` - Personally Identifiable Info (Names, Addresses)
        * `CREDENTIALS_AUTH` - Authentication Hashes / API Tokens
        * `FINANCIAL_RECORDS` - Corporate Accounting / Trade Ledger Data
        * `PUBLIC_MARKETING` - Publicly Available Marketing Assets
    DocumentTypeEnum:
      enum:
      - MSA
      - DPA
      - SOC2_TYPE2
      - PCI_DSS_AOC
      type: string
      description: |-
        * `MSA` - Master Services Agreement
        * `DPA` - Data Processing Addendum
        * `SOC2_TYPE2` - SOC 2 Type II Compliance Report
        * `PCI_DSS_AOC` - PCI-DSS Attestation of Compliance
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
        error:
          type: string
    ExtractionStatusEnum:
      enum:
      - PENDING
      - SUCCESS
      - FAILED
      type: string
      description: |-
        * `PENDING` - Pending Engine Queue
        * `SUCCESS` - Parsed and Validated
        * `FAILED` - Pipeline Error Processing File
    StatusEnum:
      enum:
      - PENDING
      - PROCESSING
      - VERIFIED
      - CONDITIONAL
      - QUARANTINED
      type: string
      description: |-
        * `PENDING` - Pending Assessment
        * `PROCESSING` - Processing Ingestion Pipeline
        * `VERIFIED` - Verified Low Risk
        * `CONDITIONAL` - Conditional Medium Risk
        * `QUARANTINED` - Critical High Risk Action Required
    VendorDetail:
      type: object
      properties:
        vendor_id:
          type: string
          format: uuid
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        declared_data_categories:
          type: array
          items:
            $ref: '#/components/schemas/DeclaredDataCategoriesEnum'
          readOnly: true
        declared_systems_accessed:
          type: array
          items:
            type: string
          readOnly: true
        documents:
          type: array
          items:
            $ref: '#/components/schemas/VendorDocument'
          readOnly: true
        execution_trace_log:
          type: string
          format: uri
          readOnly: true
        vendor_name:
          type: string
          description: Official legal corporate name of the vendor entity.
          maxLength: 255
        vendor_type:
          type: string
          description: Operational categorization. e.g., 'Cloud Storage Provider'.
          maxLength: 100
        business_owner:
          type: string
          description: Internal enterprise manager overseeing the relationship.
          maxLength: 255
        annual_spend:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        extracted_legal_bounds:
          description: "\n            - contract_end_date, contract_start_date (ISO
            strings)\n            - breach_notification_hours (integer numbers)\n
            \           - data_return_deadline_days (integer numbers)\n            -
            subprocessors_disclosed (array of text strings)\n            - data_categories_processed
            (array of text strings)\n            - liability_cap_usd (numeric float/integer
            value)\n            - liability_uncapped_for_security_breach (boolean)\n
            \           - cert_termination_right (boolean)\n            - soc2_opinion_type
            (\"qualified\" or \"unqualified\")\n            - soc2_audit_period_end
            (ISO string)\n            - pci_dss_level (integer or string value)\n
            \           - pci_assessor_type (\"independent_qsa\" or \"self_assessed\")\n
            \           "
        discovered_infrastructure:
          description: |-
            Array of live discovered endpoint configurations. Expected structure:
            [
              {'system_name': 'prod-db-01', 'data_sensitivity': 'PCI_HIGH_CRITICALITY'}
            ]
        current_risk_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        previous_risk_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        risk_narrative_summary:
          type: string
          nullable: true
          description: AI-generated audit rationale explaining compliance exceptions
            or structural defects.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - business_owner
      - created_at
      - declared_data_categories
      - declared_systems_accessed
      - documents
      - execution_trace_log
      - status
      - updated_at
      - vendor_id
      - vendor_name
      - vendor_type
    VendorDocument:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
          readOnly: true
        document_type:
          allOf:
          - $ref: '#/components/schemas/DocumentTypeEnum'
          readOnly: true
        extraction_status:
          allOf:
          - $ref: '#/components/schemas/ExtractionStatusEnum'
          readOnly: true
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
        is_expired:
          type: boolean
          readOnly: true
      required:
      - document_id
      - document_type
      - extraction_status
      - is_expired
      - uploaded_at
    VendorIngestionRequestRequest:
      type: object
      properties:
        vendor_name:
          type: string
          minLength: 1
          description: Official legal corporate name of the vendor entity.
          maxLength: 255
        vendor_type:
          type: string
          minLength: 1
          description: Operational categorization. e.g., 'Cloud Storage Provider'.
          maxLength: 100
        business_owner:
          type: string
          minLength: 1
          description: Internal enterprise manager overseeing the relationship.
          maxLength: 255
        annual_spend:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        declared_data_categories:
          type: array
          items:
            $ref: '#/components/schemas/DeclaredDataCategoriesEnum'
        declared_systems_accessed:
          type: string
          minLength: 1
        documents:
          type: array
          items:
            type: string
            format: binary
          writeOnly: true
          description: 'Upload files simultaneously. File names must contain structural
            keywords to match types correctly: ''MSA'' for contracts, ''DPA'' for
            privacy guidelines, ''SOC'' for audits, or ''PCI''/''AOC'' for processing
            compliance.'
      required:
      - business_owner
      - documents
      - vendor_name
      - vendor_type
    VendorIngestionResponse:
      type: object
      properties:
        message:
          type: string
        vendor_id:
          type: string
          format: uuid
        current_status:
          $ref: '#/components/schemas/CurrentStatusEnum'
      required:
      - current_status
      - message
      - vendor_id
    VendorList:
      type: object
      properties:
        vendor_id:
          type: string
          format: uuid
          readOnly: true
        vendor_name:
          type: string
          description: Official legal corporate name of the vendor entity.
          maxLength: 255
        vendor_type:
          type: string
          description: Operational categorization. e.g., 'Cloud Storage Provider'.
          maxLength: 100
        business_owner:
          type: string
          description: Internal enterprise manager overseeing the relationship.
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        current_risk_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        previous_risk_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - business_owner
      - created_at
      - status
      - updated_at
      - vendor_id
      - vendor_name
      - vendor_type
    VendorRiskPredictionResponse:
      type: object
      properties:
        vendor_id:
          type: string
        vendor_name:
          type: string
        is_anomaly:
          type: boolean
        anomaly_type:
          type: string
        confidence:
          type: number
          format: double
        all_probs:
          type: object
          additionalProperties:
            type: number
            format: double
      required:
      - all_probs
      - anomaly_type
      - confidence
      - is_anomaly
      - vendor_id
      - vendor_name
