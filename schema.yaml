openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/analytics/vendors/:
    get:
      operationId: analytics_vendors_list
      description: Returns a clean array containing all registered vendor compliance
        rows.
      summary: List vendors
      tags:
      - Vendors
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VendorList'
          description: ''
  /api/analytics/vendors/{vendor_id}/:
    get:
      operationId: analytics_vendors_retrieve
      description: Fetches the complete compliance ledger, including data categories,
        legal bounds, and linked document artifacts.
      summary: Retrieve a vendor compliance profile
      parameters:
      - in: path
        name: vendor_id
        schema:
          type: string
          format: uuid
        description: The unique database UUID identifying the target vendor record.
        required: true
      tags:
      - Vendors
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorDetail'
          description: ''
        '404':
          description: The specified vendor UUID does not exist.
  /api/analytics/vendors/{vendor_id}/predict/:
    get:
      operationId: analytics_vendors_predict_retrieve
      description: |-
        Accepts a vendor_id, looks up the vendor's registry row in the DB,
        runs feature extraction + trained RandomForest model, returns the prediction.
      parameters:
      - in: path
        name: vendor_id
        schema:
          type: string
        required: true
      tags:
      - analytics
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
